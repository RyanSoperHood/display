<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Proper mobile scaling -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Prevent caching -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Display</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
    height: 100%;
  }

  img {
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* Change to 'cover' if you want edge-to-edge crop */
    display: block;
  }
</style>
</head>

<body>

<img id="art" src="Artboard.png" alt="Display Image">

<script>
  // Refresh image every 5 minutes (change if desired)
  const refreshInterval = 300000; // 5 minutes

  function refreshImage() {
    const img = document.getElementById("art");
    img.src = "Artboard.png?ts=" + new Date().getTime();
  }

  setInterval(refreshImage, refreshInterval);

  // iPad Safari UI collapse nudge (harmless on desktop)
  window.addEventListener("load", () => {
    setTimeout(() => {
      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 0), 50);
    }, 300);
  });
</script>

</body>
</html>
