<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Prevent caching -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Display</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
    }
    #art {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <img id="art" src="Artboard.png" alt="Display Image" />
  <script>
    const refreshInterval = 3600000;
    const hardReloadInterval = 3600000; // 

    function refreshImage() {
      const img = document.getElementById("art");
      img.src = "Artboard.png?ts=" + Date.now();
    }

    function hardReload() {
      location.reload(true);
    }

    setInterval(refreshImage, refreshInterval);
    setTimeout(hardReload, hardReloadInterval);
  </script>
</body>
</html>
